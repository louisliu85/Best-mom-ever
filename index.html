<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三重限定母親節拍貼機 🌸</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- html2canvas for downloading the strip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Noto Sans TC', 'sans-serif'],
                        'cursive': ['"Great Vibes"', 'cursive'],
                    },
                    colors: {
                        'mom-purple-light': '#d8b4fe',
                        'mom-bg': '#faf5ff',
                        'mom-dark': '#9333ea',
                        'text-dark': '#1a1a1a'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; background-color: white; }
            100% { opacity: 0; }
        }
        .flash-effect {
            animation: flash 0.5s ease-out;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9333ea; }
        
        .strip-texture {
            background-color: #faf5ff;
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }
        
        .btn-active-scale:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="bg-purple-50 min-h-screen text-gray-800 font-sans selection:bg-purple-300">

            <h1 class="text-3xl md:text-4xl font-bold text-mom-dark mb-2 flex items-center justify-center gap-3">

                        <p>請開啟相機</p>
                    </div>

                    <div id="countdown-overlay" class="absolute inset-0 bg-black/40 flex items-center justify-center text-white text-8xl font-bold hidden z-10 no-select">

                </div>

                    </button>

                    <div id="camera-main-controls" class="flex items-center justify-between px-6 py-2 hidden">
                        <button id="btn-retake" class="flex flex-col items-center gap-1 text-gray-400 hover:text-mom-dark transition disabled:opacity-30 disabled:pointer-events-none" disabled title="重拍上一張">
                            <div class="w-12 h-12 rounded-full border-2 border-current flex items-center justify-center">

                            </div>
                            <span class="text-[10px] font-bold">重拍一次</span>
                        </button>

                        <div class="relative">

                                <svg id="icon-camera" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><circle cx="12" cy="13" r="3" stroke="currentColor" stroke-width="2"></circle></svg>
                                <svg id="icon-check" class="w-12 h-12 hidden text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </button>
                            <div id="capture-progress" class="absolute -inset-2 rounded-full border-2 border-mom-purple-light opacity-30"></div>
                        </div>

                        <button id="btn-flip" class="flex flex-col items-center gap-1 text-gray-400 hover:text-mom-dark transition">
                            <div class="w-12 h-12 rounded-full border-2 border-current flex items-center justify-center">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 12l-3-3m3 3l3-3M17 8V20m0-12l3 3m-3-3l-3 3"></path></svg>
                            </div>

                        </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('webcam');
            const placeholder = document.getElementById('camera-placeholder');
            const btnStart = document.getElementById('btn-start');
            const btnCapture = document.getElementById('btn-capture');
            const btnRetake = document.getElementById('btn-retake');
            const btnFlip = document.getElementById('btn-flip');
            const btnResetAll = document.getElementById('btn-reset-all');
            const btnGenerate = document.getElementById('btn-generate');
            const cameraMainControls = document.getElementById('camera-main-controls');
            
            const iconCamera = document.getElementById('icon-camera');
            const iconCheck = document.getElementById('icon-check');
            const captureProgress = document.getElementById('capture-progress');
            
            const countdownOverlay = document.getElementById('countdown-overlay');
            const flash = document.getElementById('flash');
            const statusMessage = document.getElementById('status-message');
            const dateText = document.getElementById('current-date');
            const modal = document.getElementById('result-modal');
            const finalImg = document.getElementById('final-result-img');
            const btnCloseModal = document.getElementById('btn-close-modal');

            let stream = null;
            let currentPhotoIndex = 0;
            const TOTAL_PHOTOS = 4;
            let isCountingDown = false;
            let facingMode = "user"; 

            dateText.innerText = `HAPPY MOTHER'S DAY ${new Date().getFullYear()}`;

            const patternCanvas = document.createElement('canvas');
            patternCanvas.width = 20; patternCanvas.height = 20;
            const pCtx = patternCanvas.getContext('2d');
            pCtx.fillStyle = '#faf5ff'; pCtx.fillRect(0, 0, 20, 20);
            pCtx.fillStyle = '#d8b4fe'; pCtx.beginPath(); pCtx.arc(10, 10, 1.5, 0, Math.PI * 2); pCtx.fill();
            document.getElementById('photostrip').style.backgroundImage = `url(${patternCanvas.toDataURL('image/png')})`;

            async function startCamera() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        video.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        btnStart.classList.add('hidden');
                        cameraMainControls.classList.remove('hidden');
                        btnResetAll.classList.remove('hidden');
                        statusMessage.classList.remove('hidden');
                        updateUI();
                    };
                } catch (err) {
                    console.error("Camera error:", err);
                    alert("無法存取相機。");
                }
            }

            btnStart.addEventListener('click', startCamera);

            btnFlip.addEventListener('click', () => {
                facingMode = facingMode === "user" ? "environment" : "user";
                startCamera();
            });

            btnRetake.addEventListener('click', async () => {
                if (currentPhotoIndex > 0 && !isCountingDown) {
                    // 如果原本是拍滿狀態（鏡頭可能被關閉了），則標記需要重啟
                    const wasAtMax = (currentPhotoIndex === TOTAL_PHOTOS);
                    
                    const imgElement = document.getElementById(`photo-${currentPhotoIndex}`);
                    imgElement.src = "";
                    imgElement.classList.add('hidden');
                    currentPhotoIndex--;
                    
                    iconCamera.classList.remove('hidden');
                    iconCheck.classList.add('hidden');
                    btnCapture.classList.replace('bg-green-500', 'bg-mom-dark');
                    btnCapture.classList.remove('hidden');
                    btnGenerate.classList.add('hidden');

                    // 關鍵修正：如果是從拍滿狀態退回，重新啟動相機
                    if (wasAtMax || video.classList.contains('hidden')) {
                        await startCamera();
                    }
                    
                    updateUI();
                    statusMessage.innerText = `已移除上一張，準備重拍第 ${currentPhotoIndex + 1} 張。`;
                }
            });

            btnCapture.addEventListener('click', () => {
                if (currentPhotoIndex === TOTAL_PHOTOS && !isCountingDown) {
                    btnGenerate.click();
                    return;
                }
                
                if (currentPhotoIndex >= TOTAL_PHOTOS || isCountingDown) return;
                
                isCountingDown = true;
                btnCapture.disabled = true;
                btnRetake.disabled = true;
                btnFlip.disabled = true;
                
                let count = 3;
                countdownOverlay.innerText = count;
                countdownOverlay.classList.remove('hidden');
                
                const countdownInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownOverlay.innerText = count;
                    } else {
                        clearInterval(countdownInterval);
                        countdownOverlay.classList.add('hidden');
                        takePhoto();
                    }
                }, 1000);
            });

            function takePhoto() {
                flash.classList.add('flash-effect');
                setTimeout(() => flash.classList.remove('flash-effect'), 500);
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const targetWidth = 900, targetHeight = 600;
                canvas.width = targetWidth; canvas.height = targetHeight;
                
                const videoRatio = video.videoWidth / video.videoHeight;
                const targetRatio = targetWidth / targetHeight;
                let sx, sy, sWidth, sHeight;
                
                if (videoRatio > targetRatio) {
                    sHeight = video.videoHeight; sWidth = sHeight * targetRatio;
                    sx = (video.videoWidth - sWidth) / 2; sy = 0;
                } else {
                    sWidth = video.videoWidth; sHeight = sWidth / targetRatio;
                    sx = 0; sy = (video.videoHeight - sHeight) / 2;
                }
                
                ctx.translate(targetWidth, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, targetWidth, targetHeight);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.fillStyle = 'rgba(216, 180, 254, 0.03)'; ctx.fillRect(0, 0, targetWidth, targetHeight);
                
                currentPhotoIndex++;
                const imgElement = document.getElementById(`photo-${currentPhotoIndex}`);
                imgElement.src = canvas.toDataURL('image/jpeg', 0.9);
                imgElement.classList.remove('hidden');
                
                iconCamera.classList.add('hidden');
                iconCheck.classList.remove('hidden');
                btnCapture.classList.replace('bg-mom-dark', 'bg-green-500');
                
                if (currentPhotoIndex === TOTAL_PHOTOS) {
                    isCountingDown = false;
                    btnCapture.disabled = false;
                    btnRetake.disabled = false;
                    btnFlip.disabled = false;
                    updateUI();
                    statusMessage.innerText = "拍攝完成！請按下打勾按鈕產生圖片！";
                    
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                        video.classList.add('hidden');
                        placeholder.innerHTML = `<p class="text-green-500 font-bold">拍攝完成！</p><p class="text-sm mt-2">點擊下方打勾按鈕匯出</p>`;
                        placeholder.classList.remove('hidden');
                    }
                } else {
                    setTimeout(() => {
                        isCountingDown = false;
                        btnCapture.disabled = false;
                        btnRetake.disabled = false;
                        btnFlip.disabled = false;
                        iconCamera.classList.remove('hidden');
                        iconCheck.classList.add('hidden');
                        btnCapture.classList.replace('bg-green-500', 'bg-mom-dark');
                        updateUI();
                    }, 1500);
                }
            }

            function updateUI() {
                btnRetake.disabled = (currentPhotoIndex === 0);
                const progress = (currentPhotoIndex / TOTAL_PHOTOS) * 100;
                captureProgress.style.borderWidth = '4px';
                captureProgress.style.borderColor = progress === 100 ? '#10b981' : '#d8b4fe';
                statusMessage.innerText = `進度：${currentPhotoIndex} / ${TOTAL_PHOTOS}`;
            }

            btnResetAll.addEventListener('click', () => {
                currentPhotoIndex = 0;
                for(let i=1; i<=TOTAL_PHOTOS; i++) {
                    const img = document.getElementById(`photo-${i}`);
                    img.src = ""; img.classList.add('hidden');
                }
                iconCamera.classList.remove('hidden');
                iconCheck.classList.add('hidden');
                btnCapture.classList.replace('bg-green-500', 'bg-mom-dark');
                btnCapture.classList.remove('hidden');
                btnGenerate.classList.add('hidden');
                placeholder.innerHTML = `<svg class="w-16 h-16 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><p>請先開啟相機</p>`;
                startCamera(); 
            });

            btnGenerate.addEventListener('click', async () => {
                const originalText = btnGenerate.innerHTML;
                btnGenerate.disabled = true;
                btnGenerate.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 inline text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 產生中...`;

                const stripElement = document.getElementById('photostrip');
                try {
                    const canvas = await html2canvas(stripElement, {
                        scale: 2, useCORS: true, backgroundColor: '#faf5ff',
                        onclone: (clonedDoc) => {
                            const content = clonedDoc.getElementById('photostrip-content');
                            if (content) content.style.transform = 'translateY(-20pt)';
                            const svg = clonedDoc.getElementById('uuid-1e8b86b9-b200-474a-9b03-89a1390cff85');
                            if (svg) svg.style.transform += ' translateX(-10px)';
                        }
                    });
                    finalImg.src = canvas.toDataURL('image/jpeg', 0.95);
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                } catch (error) {
                    alert("產生失敗，請重試。");
                } finally {
                    btnGenerate.innerHTML = originalText;
                    btnGenerate.disabled = false;
                }
            });

            btnCloseModal.addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            });
        });
    </script>
</body>
</html>
